<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Kopanski — Director / Editor / Producer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #4ecdc4;
      --white: #f0ede8;
      --dark: #080808;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* ── FIXED HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 28px;
      pointer-events: none;
    }

    .kvp-logo { pointer-events: auto; }

    .kvp-logo svg {
      width: 56px;
      height: 40px;
      filter: drop-shadow(0 0 8px rgba(0,0,0,0.7));
    }

    .header-name {
      pointer-events: auto;
      text-align: right;
    }

    .header-name a {
      display: block;
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--white);
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,0.8);
      transition: color 0.2s;
    }

    .header-name a:hover { color: var(--teal); }

    .header-name .subtitle {
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: rgba(240,237,232,0.55);
      text-transform: uppercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      margin-top: 3px;
    }

    /* ── INTRO PANEL ── */
    .intro-panel {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      background: var(--dark);
      cursor: pointer;
    }

    .intro-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(78,205,196,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .intro-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
      line-height: 1;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
    }

    .intro-rule {
      width: 60px;
      height: 1px;
      background: var(--teal);
      margin: 22px auto;
      animation: fadeUp 1.2s ease 0.2s forwards;
      opacity: 0;
    }

    .intro-title {
      font-size: clamp(0.55rem, 1.5vw, 0.72rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.5);
      text-align: center;
      animation: fadeUp 1.2s ease 0.4s forwards;
      opacity: 0;
    }

    /* Tap to begin prompt */
    .tap-prompt {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 1.2s ease 0.9s forwards;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .tap-prompt.hidden { opacity: 0 !important; pointer-events: none; }

    .tap-prompt span {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.4);
      white-space: nowrap;
    }

    .tap-circle {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(78,205,196,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ripple 2s ease infinite;
    }

    .tap-circle::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--teal);
      border-radius: 50%;
    }

    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0 rgba(78,205,196,0.35); }
      70%  { box-shadow: 0 0 0 14px rgba(78,205,196,0); }
      100% { box-shadow: 0 0 0 0 rgba(78,205,196,0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── VIDEO PANELS ── */
    .video-panel {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .video-panel iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 177.78vh;
      height: 100vh;
      min-width: 100%;
      min-height: 56.25vw;
      border: none;
      pointer-events: none;
    }

    .video-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.38) 100%);
      pointer-events: none;
    }

    /* ── CONTACT PANEL ── */
    .contact-panel {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      background: var(--dark);
      position: relative;
    }

    .contact-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(78,205,196,0.03) 0%, transparent 65%);
      pointer-events: none;
    }

    .contact-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.3);
      margin-bottom: 8px;
    }

    .contact-email {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--teal);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-email:hover { color: var(--white); }

    .contact-rule {
      width: 40px;
      height: 1px;
      background: rgba(78,205,196,0.3);
      margin: 18px 0;
    }

    .contact-tagline {
      font-size: 0.52rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.2);
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--teal); }
  </style>
</head>

  <script>
    // Load YouTube IFrame API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var players = [];
    var readyCount = 0;
    var totalPlayers = 11;
    var unlocked = false;
    var panels = [];

    function onYouTubeIframeAPIReady() {
      for (var i = 0; i < totalPlayers; i++) {
        (function(index) {
          players[index] = new YT.Player('p' + index, {
            events: {
              onReady: function(e) {
                e.target.mute();
                readyCount++;
              }
            }
          });
        })(i);
      }
    }

    // Unlock autoplay on first user interaction anywhere on the page
    function unlock() {
      if (unlocked) return;
      unlocked = true;

      // Hide tap prompt
      document.getElementById('tapPrompt').classList.add('hidden');

      // Start observing panels for scroll-based play/pause
      panels = document.querySelectorAll('.video-panel');
      panels.forEach(function(panel) {
        observer.observe(panel);
      });
    }

    document.addEventListener('click', unlock);
    document.addEventListener('touchstart', unlock);
    document.addEventListener('scroll', unlock, { once: true });

    // Intersection Observer — play when panel is 50% visible
    var observer = new IntersectionObserver(function(entries) {
      if (!unlocked) return;
      entries.forEach(function(entry) {
        var panel = entry.target;
        var index = Array.from(document.querySelectorAll('.video-panel')).indexOf(panel);
        if (index < 0 || !players[index] || readyCount < 1) return;
        try {
          if (entry.isIntersecting) {
            players[index].playVideo();
          } else {
            players[index].pauseVideo();
          }
        } catch(e) {}
      });
    }, { threshold: 0.5 });

  </script>
